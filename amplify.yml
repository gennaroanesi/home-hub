version: 1
backend:
  phases:
    build:
      commands:
        - npm install --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    postBuild:
      commands:
        # Trigger the WhatsApp bot image build via CodeBuild.
        #
        # Amplify Hosting's build environment has no Docker daemon and no ECR
        # permissions, so the docker build/push lives in a CodeBuild project
        # (defined in amplify/backend.ts). This step:
        #   1. exports stack outputs needed by the Next.js runtime
        #   2. tars the whatsapp-bot/ directory and uploads it to S3
        #   3. fires off CodeBuild and exits (fire-and-forget)
        #
        # CodeBuild handles the rest: build → push → ECS redeploy → write a
        # homeOutboundMessage row so the bot itself reports the result to
        # the household WhatsApp group when the new task connects.
        # IMPORTANT: the entire script body runs in a subshell `( ... )` so
        # any `exit 0` we use to early-skip the bot trigger only exits the
        # subshell, not the whole Amplify build. Without the subshell, an
        # `exit 0` here ends the build before the frontend phase ever runs
        # — Amplify then fails the deploy with "Can't find required-server-
        # files.json in build output directory" because no .next/ exists.
        - |
          (
            set -e
            STACK_NAME=$(aws cloudformation list-stacks --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE UPDATE_ROLLBACK_COMPLETE --query "StackSummaries[?starts_with(StackName,'amplify-${AWS_APP_ID}-${AWS_BRANCH}')].StackName" --output text | tr '\t' '\n' | awk '{ print length, $0 }' | sort -n | head -1 | cut -d' ' -f2-)
            if [ -z "$STACK_NAME" ]; then
              echo "Stack not found, skipping bot build trigger"
              exit 0
            fi

            # Stack outputs that the Next.js API routes need at runtime
            CLUSTER_ARN=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='whatsappBotClusterArn'].OutputValue" --output text 2>/dev/null)
            if [ -n "$CLUSTER_ARN" ] && [ "$CLUSTER_ARN" != "None" ]; then
              echo "WHATSAPP_BOT_CLUSTER_ARN=$CLUSTER_ARN" >> .env.production
            fi

            BUILD_PROJECT=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='whatsappBotBuildProjectName'].OutputValue" --output text 2>/dev/null)
            ARTIFACTS_S3=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='whatsappBotBuildArtifactsPrefix'].OutputValue" --output text 2>/dev/null)

            if [ -z "$BUILD_PROJECT" ] || [ "$BUILD_PROJECT" = "None" ]; then
              echo "Bot CodeBuild project not found in stack outputs, skipping bot build trigger"
              exit 0
            fi

            # Skip when nothing under whatsapp-bot/ changed since the last
            # successful bot image build. Amplify builds run on every commit,
            # but we only want to rebuild the bot container when bot code
            # actually changes.
            #
            # Previously this checked only HEAD via `git show`, which missed
            # the case of: commit A changes bot code, commit B doesn't touch
            # the bot, Amplify batches both into one build → HEAD=B → skip →
            # phase A never lands. Now we scan every commit pulled into this
            # build (fetch-depth may be shallow, so walk what's available).
            # As a fallback, diff against the image tagged `latest` by looking
            # at the git sha stored in the previous ECR image description —
            # but that requires ECR access we may not have here, so we
            # default to "check the last 20 commits" which is enough for a
            # weekly cadence without being expensive.
            BOT_CHANGED=$(git log --pretty=format: --name-only -n 20 HEAD 2>/dev/null | grep '^whatsapp-bot/' | head -1)
            if [ -z "$BOT_CHANGED" ]; then
              echo "Bot code unchanged in last 20 commits, skipping CodeBuild trigger"
              exit 0
            fi

            COMMIT_SHA=$(git rev-parse HEAD)
            TAR_NAME="whatsapp-bot-${COMMIT_SHA}.tar.gz"
            # Strip the s3:// prefix and split into bucket + key prefix
            ARTIFACTS_BARE="${ARTIFACTS_S3#s3://}"
            ARTIFACTS_BUCKET="${ARTIFACTS_BARE%%/*}"
            ARTIFACTS_KEY_PREFIX="${ARTIFACTS_BARE#*/}"
            S3_KEY="${ARTIFACTS_KEY_PREFIX}/${TAR_NAME}"

            echo "Tarring whatsapp-bot/ → s3://${ARTIFACTS_BUCKET}/${S3_KEY}"
            tar -czf "/tmp/${TAR_NAME}" -C whatsapp-bot .
            aws s3 cp "/tmp/${TAR_NAME}" "s3://${ARTIFACTS_BUCKET}/${S3_KEY}"

            echo "Starting CodeBuild project ${BUILD_PROJECT} for commit ${COMMIT_SHA:0:7}"
            aws codebuild start-build \
              --project-name "${BUILD_PROJECT}" \
              --source-location-override "${ARTIFACTS_BUCKET}/${S3_KEY}" \
              --environment-variables-override "name=COMMIT_SHA,value=${COMMIT_SHA},type=PLAINTEXT" \
              --no-cli-pager \
              --query 'build.id' --output text || echo "Warning: failed to start CodeBuild — check Amplify build role permissions"
          ) || true
frontend:
  phases:
    preBuild:
      commands:
        - npm install --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
